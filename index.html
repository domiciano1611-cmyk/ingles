<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoMax - Neural IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-dark: #0a0a0c;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            overflow-x: hidden; 
        }

        /* --- ANIMAÇÃO DOS AVATARES --- */
        .avatar-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .sidebar-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 3px solid transparent;
            margin: 4px 0;
        }
        .sidebar-item:hover { background: var(--glass); color: var(--accent-cyan); }
        .sidebar-active { 
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--accent-purple);
            color: var(--accent-purple) !important;
        }

        .unit-header { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .node {
            width: 70px; height: 70px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
            position: relative; transition: all 0.4s;
            background: var(--bg-dark);
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            color: var(--accent-purple);
            margin: 20px auto;
            z-index: 10;
        }
        
        @media (min-width: 768px) {
            .node { width: 80px; height: 80px; font-size: 24px; margin: 30px auto; }
        }

        .node:hover:not(.locked) {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
            background: var(--accent-purple);
            color: white;
        }
        .node.locked { 
            border-color: #334155; 
            color: #334155; 
            box-shadow: none; 
            opacity: 0.5;
            cursor: not-allowed;
        }
        .node.current { 
            animation: pulse-cyan 2s infinite; 
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }

        .path-line {
            width: 2px; height: 50px;
            background: linear-gradient(to bottom, var(--accent-purple), #334155);
            margin: -15px auto;
        }

        #quiz-overlay {
            position: fixed; inset: 0; 
            background: rgba(10, 10, 12, 0.98); 
            z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        .btn-option {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
            padding: 1.25rem;
            font-size: 0.95rem;
        }

        .cyber-btn {
            background: var(--accent-purple);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: all 0.3s;
        }

        #custom-alert {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .alert-card {
            background: var(--bg-dark);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .user-badge:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="custom-alert">
        <div class="alert-card">
            <div id="alert-icon" class="text-4xl mb-4 text-cyan-400">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3 id="alert-title" class="text-xl font-bold text-white mb-2 uppercase tracking-tight"></h3>
            <p id="alert-msg" class="text-slate-400 mb-6 text-sm font-light"></p>
            <button onclick="closeAlert()" class="cyber-btn px-8 py-3 text-xs font-bold uppercase tracking-widest w-full">Continuar</button>
        </div>
    </div>

    <nav class="w-full md:w-64 h-auto md:h-screen border-b md:border-r border-white/10 p-4 md:p-6 flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start sticky top-0 md:fixed bg-[#0a0a0c] z-50">
        <div class="flex items-center gap-3 md:mb-10">
            <div class="w-6 h-6 md:w-8 md:h-8 bg-cyan-500 rounded-lg animate-pulse"></div>
            <h1 class="text-white text-xl md:text-2xl font-bold tracking-tighter">LINGOMAX</h1>
        </div>
        
        <div class="hidden md:block space-y-1 w-full">
            <div class="sidebar-item sidebar-active p-4 flex items-center gap-4 cursor-pointer rounded-xl">
                <i class="fas fa-terminal text-lg"></i> <span class="font-medium text-sm tracking-wide">CONEXÃO</span>
            </div>
            <div class="sidebar-item p-4 flex items-center gap-4 cursor-pointer text-slate-500 rounded-xl">
                <i class="fas fa-database text-lg"></i> <span class="font-medium text-sm tracking-wide">MÓDULOS</span>
            </div>
        </div>

        <div class="md:hidden">
            <i class="fas fa-bars text-slate-400 text-xl"></i>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-12 md:ml-64 flex flex-col items-center bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-purple-900/10 via-transparent to-transparent">
        
        <div class="w-full max-w-5xl flex flex-col md:flex-row justify-between items-center md:items-stretch gap-6 mb-8 md:mb-16">
            
            <div class="unit-header flex-1 p-6 md:p-8 flex flex-row justify-between items-center gap-4 w-full">
                <div>
                    <p id="section-tag" class="text-cyan-400 font-bold uppercase text-[9px] tracking-[0.3em] mb-1">SYSTEM READY / SEÇÃO 01</p>
                    <h2 id="section-title" class="text-2xl md:text-3xl font-bold text-white">The House / <span class="text-slate-500 font-light italic">A Casa</span></h2>
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-slate-500 block mb-1">DATA STATUS</span>
                    <div class="h-1 w-20 md:w-24 bg-slate-800 rounded-full overflow-hidden">
                        <div id="data-bar" class="h-full bg-cyan-500 w-1/3 animate-pulse"></div>
                    </div>
                </div>
            </div>

            <div class="user-badge flex items-center gap-4 p-4 pr-8 border border-white/10 rounded-3xl bg-white/5 backdrop-blur-md transition-all cursor-pointer h-full self-center">
                <div class="relative">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center text-white shadow-lg overflow-hidden border border-white/20">
                        <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=LingoMax&backgroundColor=b6e3f4,c0aede" alt="Avatar" class="w-10 h-10">
                    </div>
                    <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-[#0a0a0c] rounded-full"></div>
                </div>
                <div>
                    <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest leading-none mb-1">Neural Operative</p>
                    <h4 class="text-sm font-bold text-white tracking-tight">Cyber_User_01</h4>
                    <div class="flex items-center gap-2 mt-1">
                        <i class="fas fa-crown text-[10px] text-yellow-500"></i>
                        <span class="text-[10px] text-slate-400 font-medium">RANK: <span class="text-white">PLATINUM II</span></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-2xl w-full relative">
            <div class="absolute left-[-60px] top-[0px] avatar-float hidden md:block">
                <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=happy&eyes=happy&mouth=smile01" class="w-16 h-16 opacity-80" alt="Start Avatar">
                <p class="text-[8px] text-cyan-400 font-bold text-center mt-1 uppercase tracking-tighter">Start</p>
            </div>

            <div class="flex flex-col items-center py-4">
                <div id="node-1" class="node current" onclick="startQuiz(1)"><i class="fas fa-microchip"></i></div>
                <div class="path-line"></div>
                <div id="node-2" class="node locked md:translate-x-12" onclick="startQuiz(2)"><i class="fas fa-lock"></i></div>
                <div class="path-line"></div>
                
                <div class="relative w-full">
                    <div class="absolute right-[20px] top-[-20px] avatar-float hidden md:block">
                        <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=cowboy&sides=antenna01&eyes=builtIn&mouth=smile02" class="w-20 h-20" alt="Cowboy Avatar">
                        <p class="text-[8px] text-purple-400 font-bold text-center mt-1 uppercase tracking-tighter">Midway</p>
                    </div>
                    <div id="node-3" class="node locked md:-translate-x-8" onclick="startQuiz(3)"><i class="fas fa-lock"></i></div>
                </div>

                <div class="path-line"></div>
                <div id="node-4" class="node locked" onclick="startQuiz(4)"><i class="fas fa-lock"></i></div>
                <div class="path-line"></div>
                <div id="node-5" class="node locked md:translate-x-10" onclick="startQuiz(5)"><i class="fas fa-shield-virus"></i></div>
            </div>
        </div>

        <div class="w-full max-w-2xl mt-8 block">
            <div class="border border-white/10 rounded-3xl p-5 bg-white/5 backdrop-blur-sm">
                <h3 class="text-[10px] font-bold text-slate-500 mb-4 tracking-widest uppercase">Rank Neural</h3>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-cyan-400 p-[1px]">
                        <div class="w-full h-full rounded-full bg-slate-900 flex items-center justify-center">
                            <i class="fas fa-user text-xs text-white"></i>
                        </div>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-white">Você</p>
                        <p class="text-[10px] text-slate-500">17º de 500 candidatos</p>
                    </div>
                    <span class="text-cyan-400 text-xs font-bold">840 XP</span>
                </div>
            </div>
        </div>
    </main>

    <div id="quiz-overlay">
        <div class="w-full max-w-2xl">
            <div class="flex items-center gap-4 mb-8 md:mb-16">
                <button onclick="closeQuiz()" class="text-slate-500 hover:text-white transition-colors">
                    <i class="fas fa-arrow-left text-lg"></i>
                </button>
                <div class="flex-1 h-[2px] bg-slate-800">
                    <div id="quiz-progress" class="h-full bg-cyan-500 shadow-[0_0_10px_#06b6d4] transition-all duration-700" style="width: 10%"></div>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-2">
                <p class="text-cyan-400 text-[10px] font-bold tracking-[0.4em] uppercase">Neural Query:</p>
                <button onclick="showTranslation()" class="text-cyan-400 hover:text-white transition-all">
                    <i class="fas fa-lightbulb mr-1 text-xs"></i><span class="text-[9px] font-bold uppercase tracking-widest">Dica</span>
                </button>
            </div>

            <div id="hint-box" style="display:none; color:#06b6d4; margin-bottom:10px; font-size:14px;"></div>

            <h2 id="q-text" class="text-2xl md:text-4xl font-bold text-white mb-8 md:mb-12 leading-tight">Carregando...</h2>
            
            <div id="options-box" class="grid gap-3 md:gap-4"></div>
        </div>
        
        <div id="quiz-footer" class="w-full border-t border-white/10 p-6 md:p-10 flex justify-center translate-y-full transition-transform bg-black/90 backdrop-blur-xl fixed bottom-0 left-0">
            <div class="max-w-2xl w-full flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div id="status-light" class="w-2 h-2 rounded-full bg-slate-500"></div>
                    <span id="feedback-txt" class="text-sm md:text-lg font-bold tracking-wide uppercase">Input Requerido</span>
                </div>
                <button id="btn-next" class="cyber-btn bg-purple-600 text-white px-10 py-4 font-bold text-xs tracking-widest w-full md:w-auto">PRÓXIMO</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let currentLevel = 1;
        let stepInLevel = 1;
        let correctAns = "";
        let currentTranslation = "";
        let usedQuestions = []; 
        let phase = 1;

        function showCustomAlert(title, msg, icon = "fa-check-circle") {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-icon').innerHTML = `<i class="fas ${icon}"></i>`;
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 60,
                origin: { y: 0.7 },
                colors: ['#8b5cf6', '#06b6d4', '#ffffff']
            });
        }

        function showTranslation() {
            const hint = document.getElementById('hint-box');
            hint.innerText = currentTranslation;
            hint.style.display = hint.style.display === 'block' ? 'none' : 'block';
        }

        function startQuiz(levelId) {
            if(levelId > currentLevel) return;
            document.getElementById('quiz-overlay').style.display = 'flex';
            stepInLevel = 1;
            fetchQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-overlay').style.display = 'none';
            document.getElementById('hint-box').style.display = 'none';
            document.getElementById('quiz-footer').classList.add('translate-y-full');
        }

        async function fetchQuestion() {
            document.getElementById('hint-box').style.display = 'none';
            document.getElementById('q-text').innerText = "Sincronizando dados..."; 
            const box = document.getElementById('options-box');
            box.innerHTML = `
                <div class="flex justify-center p-10 w-full col-span-full">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-500"></div>
                </div>`;

            const phaseContext = phase === 1 ? "basic rooms (kitchen, bedroom, etc)" : "furniture and house objects (sofa, fridge, lamp, etc)";
            const prompt = `You are a high-tech English Teacher for beginners. Topic: ${phaseContext}. Difficulty: CEFR A1. Instruction: Generate 1 unique question. Do NOT repeat these: [${usedQuestions.join(", ")}]. JSON format: {"q": "Question Text", "tr": "Tradução para Português do Brasil", "opts": ["Option 1", "Option 2", "Option 3"], "a": "Correct Option"}`;
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: prompt}],
                        response_format: {type: "json_object"},
                        temperature: 0.9
                    })
                });
                const data = await res.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                
                correctAns = quiz.a;
                currentTranslation = quiz.tr;
                usedQuestions.push(quiz.q); 
                
                document.getElementById('q-text').innerText = quiz.q;
                
                box.innerHTML = "";
                quiz.opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "btn-option w-full p-5 text-left rounded-2xl font-medium text-slate-300 hover:text-cyan-400 transition-all";
                    b.innerText = o;
                    b.onclick = () => verify(o, b);
                    box.appendChild(b);
                });
                
                document.getElementById('quiz-progress').style.width = (stepInLevel * 20) + "%";
            } catch(e) { 
                fetchQuestion(); 
            }
        }

        function verify(sel, b) {
            const footer = document.getElementById('quiz-footer');
            const fTxt = document.getElementById('feedback-txt');
            const light = document.getElementById('status-light');
            footer.classList.remove('translate-y-full');
            if(sel === correctAns) {
                b.classList.add('border-cyan-500', 'bg-cyan-500/10', 'text-cyan-400');
                fTxt.innerText = "ACESSO GARANTIDO";
                fTxt.className = "text-cyan-400 font-bold text-sm md:text-lg";
                light.className = "w-2 h-2 rounded-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]";
                document.getElementById('btn-next').onclick = nextStep;
            } else {
                b.classList.add('border-red-500', 'bg-red-500/10', 'text-red-400');
                fTxt.innerText = "ERRO: ESPERADO " + correctAns.toUpperCase();
                fTxt.className = "text-red-400 font-bold text-sm md:text-lg";
                light.className = "w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
                document.getElementById('btn-next').onclick = fetchQuestion; 
            }
        }

        function nextStep() {
            document.getElementById('quiz-footer').classList.add('translate-y-full');
            if(stepInLevel < 5) {
                stepInLevel++;
                fetchQuestion();
            } else {
                unlockNextLevel();
            }
        }

        function unlockNextLevel() {
            currentLevel++;
            const nextNode = document.getElementById(`node-${currentLevel}`);
            if(nextNode) {
                showCustomAlert("Sincronização Ativa", "Módulo neural descriptografado com sucesso.");
                nextNode.classList.remove('locked');
                nextNode.classList.add('current');
                nextNode.innerHTML = '<i class="fas fa-microchip"></i>';
            } else {
                if(phase === 1) startPhaseTwo();
                else {
                    triggerConfetti();
                    showCustomAlert("MISSÃO COMPLETA", "Você dominou todos os núcleos de dados!", "fa-trophy");
                }
            }
            closeQuiz();
        }

        function startPhaseTwo() {
            phase = 2;
            currentLevel = 1; 
            usedQuestions = []; 
            document.getElementById('section-tag').innerText = "SYSTEM UPDATED / SEÇÃO 02";
            document.getElementById('section-title').innerHTML = 'House Objects / <span class="text-slate-500 font-light italic">Objetos</span>';
            document.getElementById('data-bar').style.width = "70%";
            for(let i=1; i<=5; i++) {
                let node = document.getElementById(`node-${i}`);
                if(i === 1) {
                    node.className = "node current";
                    node.innerHTML = '<i class="fas fa-microchip"></i>';
                } else {
                    node.className = `node locked md:${i % 2 === 0 ? 'translate-x-12' : '-translate-x-8'}`;
                    node.innerHTML = '<i class="fas fa-lock"></i>';
                }
            }
            showCustomAlert("Fase 2 Iniciada", "Otimizando vocabulário: Móveis e Objetos.", "fa-sync-alt");
        }
    </script>
</body>
</html>
