<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow - English Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
        
        body { font-family: 'Nunito', sans-serif; background-color: #fff; color: #4b4b4b; overflow-x: hidden; }
        
        .sidebar-item { transition: all 0.2s; border: 2px solid transparent; }
        .sidebar-item:hover { background-color: #e5e7eb; border-radius: 12px; }
        .sidebar-active { background-color: #ddf4ff; border: 2px solid #84d8ff; border-radius: 12px; color: #1899d6 !important; }

        .unit-header { background-color: #58cc02; color: white; border-radius: 15px; position: relative; z-index: 10; }

        /* Trilha Visual (Caminho Pontilhado) */
        .path-container { position: relative; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        
        .path-step { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* Linha conectora */
        .connector {
            width: 8px; height: 40px;
            background: #e5e5e5;
            margin: -10px 0;
            position: relative; z-index: 1;
        }
        .connector.active { background: #58cc02; }

        .node {
            width: 70px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            position: relative; z-index: 2; transition: transform 0.1s;
            box-shadow: 0 8px 0 #46a302;
            background-color: #58cc02; color: white;
            margin: 20px 0;
        }
        .node:active { transform: translateY(4px); box-shadow: 0 4px 0 #46a302; }
        .node.locked { background-color: #e5e5e5; box-shadow: 0 8px 0 #afafaf; color: #afafaf; cursor: not-allowed; }
        .node.current { animation: bounce 2s infinite; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Personagem Animado */
        .character-box {
            position: absolute; right: -100px; top: 20%;
            width: 120px; animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #quiz-overlay {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex">

    <nav class="w-64 h-screen border-r-2 border-gray-200 p-4 flex flex-col fixed left-0 bg-white">
        <h1 class="text-[#58cc02] text-3xl font-800 mb-8 px-4 font-extrabold tracking-tighter">lingoflow</h1>
        <div class="space-y-2">
            <div class="sidebar-item sidebar-active p-3 flex items-center gap-4 cursor-pointer">
                <i class="fas fa-home text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Aprender</span>
            </div>
            <div class="sidebar-item p-3 flex items-center gap-4 cursor-pointer text-gray-500">
                <i class="fas fa-book text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Letras</span>
            </div>
            <div class="sidebar-item p-3 flex items-center gap-4 cursor-pointer text-gray-500">
                <i class="fas fa-dumbbell text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Praticar</span>
            </div>
        </div>
    </nav>

    <main class="ml-64 flex-1 p-8 flex justify-center">
        <div class="max-w-2xl w-full relative">
            
            <div class="unit-header p-5 mb-12 flex justify-between items-center shadow-md">
                <div>
                    <p class="font-bold opacity-80 uppercase text-xs">Seção 1, Unidade 1</p>
                    <h2 class="text-xl font-extrabold">The House / A Casa</h2>
                </div>
                <button class="bg-[#46a302] p-3 rounded-xl font-bold uppercase text-sm border-b-4 border-[#3a8602]">Guia</button>
            </div>

            <div class="character-box hidden xl:block">
                <img src="https://design.duolingo.com/28e4b3a8929954848dc6.svg" alt="Lingo" class="w-full">
            </div>

            <div class="path-container">
                <div class="path-step">
                    <div id="node-1" class="node current" onclick="startQuiz(1)"><i class="fas fa-star"></i></div>
                    <div id="conn-1" class="connector active"></div>
                </div>
                
                <div class="path-step">
                    <div id="node-2" class="node locked ml-20" onclick="startQuiz(2)"><i class="fas fa-book"></i></div>
                    <div id="conn-2" class="connector ml-20"></div>
                </div>

                <div class="path-step">
                    <div id="node-3" class="node locked mr-20" onclick="startQuiz(3)"><i class="fas fa-home"></i></div>
                    <div id="conn-3" class="connector mr-20"></div>
                </div>

                <div class="path-step">
                    <div id="node-4" class="node locked" onclick="startQuiz(4)"><i class="fas fa-utensils"></i></div>
                    <div id="conn-4" class="connector"></div>
                </div>

                <div class="path-step">
                    <div id="node-5" class="node locked ml-16" onclick="startQuiz(5)"><i class="fas fa-check"></i></div>
                </div>
            </div>
        </div>
    </main>

    <div id="quiz-overlay">
        <div class="w-full max-w-xl p-6">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="closeQuiz()" class="text-gray-400 text-2xl">✕</button>
                <div class="flex-1 h-4 bg-gray-100 rounded-full overflow-hidden">
                    <div id="quiz-progress" class="h-full bg-[#58cc02] transition-all" style="width: 10%"></div>
                </div>
            </div>
            
            <p class="text-gray-400 font-bold uppercase text-xs mb-2">Traduza esta frase:</p>
            <h2 id="q-text" class="text-2xl font-bold mb-8">Loading...</h2>
            <div id="options-box" class="grid gap-3"></div>
        </div>
        
        <div id="quiz-footer" class="w-full border-t-2 border-gray-100 p-8 flex justify-center fixed bottom-0 translate-y-full transition-transform bg-white">
            <div class="max-w-xl w-full flex justify-between items-center">
                <span id="feedback-txt" class="text-xl font-bold"></span>
                <button id="btn-next" class="bg-[#58cc02] text-white px-10 py-3 rounded-2xl font-extrabold border-b-4 border-[#46a302] hover:brightness-110">CONTINUAR</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let currentLevel = 1;
        let stepInLevel = 1;
        let correctAns = "";
        let usedWords = [];

        function startQuiz(levelId) {
            if(levelId > currentLevel) return;
            document.getElementById('quiz-overlay').style.display = 'flex';
            stepInLevel = 1;
            fetchQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-overlay').style.display = 'none';
        }

        async function fetchQuestion() {
            const prompt = `Teacher Mode. Topic: House Objects. Step ${stepInLevel}/5. English Only. Return JSON: {"question":"...","options":["...","...","..."],"answer":"..."}`;
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: prompt}],
                        response_format: {type: "json_object"}
                    })
                });

                const data = await res.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                
                // Correção do Erro: Usando os nomes completos dos campos do JSON
                correctAns = quiz.answer;
                document.getElementById('q-text').innerText = quiz.question;
                
                const box = document.getElementById('options-box');
                box.innerHTML = "";
                
                quiz.options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full p-4 text-left border-2 border-gray-200 rounded-2xl font-bold text-gray-700 hover:bg-gray-50 border-b-4";
                    b.innerText = o;
                    b.onclick = () => verify(o, b);
                    box.appendChild(b);
                });
                document.getElementById('quiz-progress').style.width = (stepInLevel * 20) + "%";
            } catch (e) {
                document.getElementById('q-text').innerText = "Erro ao carregar pergunta. Tentando novamente...";
                setTimeout(fetchQuestion, 2000);
            }
        }

        function verify(sel, b) {
            const footer = document.getElementById('quiz-footer');
            const fTxt = document.getElementById('feedback-txt');
            footer.classList.remove('translate-y-full');

            if(sel === correctAns) {
                b.classList.add('border-green-500', 'bg-green-100', 'text-green-700');
                fTxt.innerText = "Muito bem! 🎉";
                fTxt.className = "text-green-600 font-bold text-xl";
                document.getElementById('btn-next').onclick = nextStep;
            } else {
                b.classList.add('border-red-500', 'bg-red-100', 'text-red-700');
                fTxt.innerText = "Correto: " + correctAns;
                fTxt.className = "text-red-600 font-bold text-xl";
                document.getElementById('btn-next').onclick = fetchQuestion; 
            }
        }

        function nextStep() {
            document.getElementById('quiz-footer').classList.add('translate-y-full');
            if(stepInLevel < 5) {
                stepInLevel++;
                fetchQuestion();
            } else {
                unlockNextLevel();
            }
        }

        function unlockNextLevel() {
            currentLevel++;
            const nextNode = document.getElementById(`node-${currentLevel}`);
            const nextConn = document.getElementById(`conn-${currentLevel - 1}`);
            
            if(nextNode) {
                nextNode.classList.remove('locked');
                nextNode.classList.add('current');
                if(nextConn) nextConn.classList.add('active');
            }
            closeQuiz();
        }
    </script>
</body>
</html>
