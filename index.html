<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow - English Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
        
        body { font-family: 'Nunito', sans-serif; background-color: #fff; color: #4b4b4b; overflow-x: hidden; }
        
        .sidebar-item { transition: all 0.2s; border: 2px solid transparent; }
        .sidebar-item:hover { background-color: #e5e7eb; border-radius: 12px; }
        .sidebar-active { background-color: #ddf4ff; border: 2px solid #84d8ff; border-radius: 12px; color: #1899d6 !important; }

        .unit-header { background-color: #58cc02; color: white; border-radius: 15px; position: relative; z-index: 10; }

        /* Trilha Visual (Caminho) */
        .path-container { position: relative; padding: 40px 0; }
        .path-svg {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 200px; height: 100%; z-index: 0; pointer-events: none;
        }
        .path-line {
            fill: none; stroke: #e5e5e5; stroke-width: 8;
            stroke-dasharray: 12; stroke-linecap: round;
        }
        .path-line.active { stroke: #58cc02; }

        /* Estilo das Bolinhas */
        .node {
            width: 75px; height: 65px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            position: relative; z-index: 5; transition: all 0.2s;
            box-shadow: 0 8px 0 #46a302;
            background-color: #58cc02; color: white;
            margin-bottom: 40px;
        }
        .node:active { transform: translateY(4px); box-shadow: 0 4px 0 #46a302; }
        .node.locked { background-color: #e5e5e5; box-shadow: 0 8px 0 #afafaf; color: #afafaf; cursor: not-allowed; }
        .node.current { animation: bounce 2s infinite; border: 4px solid #fff; outline: 6px solid #58cc02; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Personagem Animado */
        .character {
            position: absolute; right: -120px; top: 20%;
            width: 100px; animation: float 4s ease-in-out infinite;
            z-index: 1;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-20px) rotate(-2deg); }
        }

        #quiz-overlay {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex">

    <nav class="w-64 h-screen border-r-2 border-gray-200 p-4 flex flex-col fixed left-0 bg-white">
        <h1 class="text-[#58cc02] text-3xl font-800 mb-8 px-4 font-extrabold tracking-tighter">lingoflow</h1>
        <div class="space-y-2">
            <div class="sidebar-item sidebar-active p-3 flex items-center gap-4 cursor-pointer">
                <i class="fas fa-home text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Aprender</span>
            </div>
            <div class="sidebar-item p-3 flex items-center gap-4 cursor-pointer text-gray-500">
                <i class="fas fa-book text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Letras</span>
            </div>
            <div class="sidebar-item p-3 flex items-center gap-4 cursor-pointer text-gray-500">
                <i class="fas fa-dumbbell text-xl"></i> <span class="font-bold uppercase tracking-wide text-sm">Praticar</span>
            </div>
        </div>
    </nav>

    <main class="ml-64 flex-1 p-8 flex justify-center">
        <div class="max-w-xl w-full">
            <div class="unit-header p-6 mb-12 flex justify-between items-center shadow-lg">
                <div>
                    <p class="font-bold opacity-90 uppercase text-xs tracking-widest">Section 1, Unit 1</p>
                    <h2 class="text-2xl font-extrabold">The House / A Casa</h2>
                </div>
                <button class="bg-[#46a302] px-5 py-2 rounded-xl font-bold uppercase text-sm border-b-4 border-[#3a8602] active:border-b-0">Guide</button>
            </div>

            <div class="path-container flex flex-col items-center">
                <svg class="path-svg" viewBox="0 0 200 600">
                    <path class="path-line active" d="M100,60 Q150,110 100,160 T100,260" />
                    <path class="path-line" d="M100,260 Q50,310 100,360 T100,460 T100,560" />
                </svg>

                <div class="character">
                    <svg viewBox="0 0 100 100" class="w-full">
                        <circle cx="50" cy="50" r="45" fill="#58cc02"/>
                        <circle cx="35" cy="40" r="12" fill="white"/>
                        <circle cx="65" cy="40" r="12" fill="white"/>
                        <circle cx="35" cy="40" r="5" fill="black"/>
                        <circle cx="65" cy="40" r="5" fill="black"/>
                        <path d="M45,55 L55,55 L50,65 Z" fill="#ff9600"/>
                        <path d="M20,75 Q50,90 80,75" fill="none" stroke="#46a302" stroke-width="5" stroke-linecap="round"/>
                    </svg>
                </div>

                <div id="node-1" class="node current" onclick="startQuiz(1)"><i class="fas fa-star"></i></div>
                <div id="node-2" class="node locked ml-24" onclick="startQuiz(2)"><i class="fas fa-book"></i></div>
                <div id="node-3" class="node locked mr-24" onclick="startQuiz(3)"><i class="fas fa-home"></i></div>
                <div id="node-4" class="node locked" onclick="startQuiz(4)"><i class="fas fa-utensils"></i></div>
                <div id="node-5" class="node locked ml-20" onclick="startQuiz(5)"><i class="fas fa-check"></i></div>
            </div>
        </div>

        <div class="w-80 ml-12 hidden xl:block pt-4">
            <div class="border-2 border-gray-200 rounded-2xl p-6">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-14 h-14 bg-purple-500 rounded-2xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-bolt text-2xl"></i>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-lg text-gray-700">Daily Goal</h3>
                        <p class="text-sm text-gray-400 font-bold">Earn 10 XP</p>
                    </div>
                </div>
                <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                    <div class="bg-yellow-400 h-full w-1/3"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="quiz-overlay">
        <div class="w-full max-w-2xl p-8">
            <div class="flex items-center gap-6 mb-12">
                <button onclick="closeQuiz()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold">✕</button>
                <div class="flex-1 h-4 bg-gray-100 rounded-full">
                    <div id="quiz-progress" class="h-full bg-[#58cc02] transition-all duration-500 rounded-full" style="width: 10%"></div>
                </div>
            </div>
            <p class="text-gray-400 font-extrabold uppercase tracking-widest text-sm mb-2">New Word!</p>
            <h2 id="q-text" class="text-3xl font-extrabold mb-10 text-slate-800">...</h2>
            <div id="options-box" class="grid gap-4"></div>
        </div>
        <div id="quiz-footer" class="w-full border-t-4 border-gray-100 p-10 flex justify-center translate-y-full transition-transform bg-white fixed bottom-0">
            <div class="max-w-2xl w-full flex justify-between items-center">
                <div id="feedback-area" class="flex items-center gap-4">
                    <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl"></div>
                    <span id="feedback-txt" class="text-2xl font-black"></span>
                </div>
                <button id="btn-next" class="bg-[#58cc02] text-white px-12 py-4 rounded-2xl font-black text-lg border-b-4 border-[#46a302] active:border-b-0 hover:brightness-105 transition-all">CONTINUE</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let currentLevel = 1;
        let stepInLevel = 1;
        let correctAns = "";
        let usedWords = [];

        function startQuiz(levelId) {
            if(levelId > currentLevel) return;
            document.getElementById('quiz-overlay').style.display = 'flex';
            stepInLevel = 1;
            fetchQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-overlay').style.display = 'none';
        }

        async function fetchQuestion() {
            const prompt = `Teacher Mode. Topic: House Objects. Step ${stepInLevel}/5. English Only. JSON: {"q":"How do you say 'Sofá' in English?","opts":["Sofa","Bed","Table"],"a":"Sofa"}`;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: prompt}],
                        response_format: {type: "json_object"}
                    })
                });
                const data = await res.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                correctAns = quiz.a;
                document.getElementById('q-text').innerText = quiz.q;
                const box = document.getElementById('options-box');
                box.innerHTML = "";
                quiz.opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full p-5 text-left border-2 border-gray-200 rounded-2xl font-bold text-xl text-gray-700 hover:bg-slate-50 border-b-4 active:border-b-2 transition-all";
                    b.innerText = o;
                    b.onclick = () => verify(o, b);
                    box.appendChild(b);
                });
                document.getElementById('quiz-progress').style.width = (stepInLevel * 20) + "%";
            } catch(e) { console.log(e) }
        }

        function verify(sel, b) {
            const footer = document.getElementById('quiz-footer');
            const txt = document.getElementById('feedback-txt');
            const icon = document.getElementById('feedback-icon');
            footer.classList.remove('translate-y-full');

            if(sel === correctAns) {
                document.body.style.backgroundColor = "#d7ffb8";
                footer.style.backgroundColor = "#d7ffb8";
                txt.innerText = "Excellent!";
                txt.className = "text-[#58a700] text-2xl font-black";
                icon.innerHTML = '<i class="fas fa-check"></i>';
                icon.className = "w-16 h-16 bg-[#58cc02] rounded-full flex items-center justify-center text-white text-2xl shadow-lg";
                document.getElementById('btn-next').className = "bg-[#58cc02] text-white px-12 py-4 rounded-2xl font-black text-lg border-b-4 border-[#46a302]";
                document.getElementById('btn-next').onclick = nextStep;
            } else {
                document.body.style.backgroundColor = "#ffdfe0";
                footer.style.backgroundColor = "#ffdfe0";
                txt.innerText = "Correct answer: " + correctAns;
                txt.className = "text-[#ea2b2b] text-2xl font-black";
                icon.innerHTML = '<i class="fas fa-times"></i>';
                icon.className = "w-16 h-16 bg-[#ff4b4b] rounded-full flex items-center justify-center text-white text-2xl shadow-lg";
                document.getElementById('btn-next').className = "bg-[#ff4b4b] text-white px-12 py-4 rounded-2xl font-black text-lg border-b-4 border-[#ea2b2b]";
                document.getElementById('btn-next').onclick = fetchQuestion; 
            }
        }

        function nextStep() {
            document.body.style.backgroundColor = "#fff";
            document.getElementById('quiz-footer').style.backgroundColor = "#fff";
            document.getElementById('quiz-footer').classList.add('translate-y-full');
            if(stepInLevel < 5) {
                stepInLevel++;
                fetchQuestion();
            } else {
                unlockNextLevel();
            }
        }

        function unlockNextLevel() {
            currentLevel++;
            const nextNode = document.getElementById(`node-${currentLevel}`);
            if(nextNode) {
                nextNode.classList.remove('locked');
                nextNode.classList.add('current');
            }
            closeQuiz();
        }
    </script>
</body>
</html>
