<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow AI 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f0f2f5; }
        .option-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-card:active { transform: scale(0.98); }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-white">
        <div class="pt-8 px-8">
            <div class="flex justify-between items-end mb-2">
                <h1 class="text-2xl font-600 text-slate-800">Praticar</h1>
                <span id="step-badge" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">ETAPA 1/10</span>
            </div>
            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-700" style="width: 10%"></div>
            </div>
        </div>

        <div class="p-8">
            <div id="quiz-content">
                <p id="instruction" class="text-slate-400 text-sm mb-2 uppercase tracking-widest font-bold">Traduza esta frase:</p>
                <h2 id="question-text" class="text-2xl text-slate-800 font-medium mb-8">...</h2>

                <div id="options-stack" class="space-y-3">
                    <div class="loading-shimmer h-16 rounded-2xl"></div>
                    <div class="loading-shimmer h-16 rounded-2xl"></div>
                    <div class="loading-shimmer h-16 rounded-2xl"></div>
                </div>
            </div>
        </div>

        <div id="feedback-bar" class="transform translate-y-full transition-transform duration-300 p-6 flex items-center justify-between">
            <span id="feedback-message" class="font-bold text-lg"></span>
            <button id="next-btn" class="hidden bg-white px-6 py-2 rounded-xl shadow-md font-bold text-slate-800 hover:bg-slate-50">Continuar</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let state = {
            step: 1,
            correctAnswer: "",
            isLocked: false
        };

        async function generateQuestion() {
            state.isLocked = true;
            resetUI();

            const systemPrompt = `Você é um professor de inglês. Gere um objeto JSON para um aluno iniciante. 
            Regra: A "correta" deve ser EXATAMENTE igual a uma das opções. 
            Formato: {"pergunta": "frase em pt", "opcoes": ["opt1", "opt2", "opt3"], "correta": "opt1"}`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Gere a etapa ${state.step} de 10.` }
                        ],
                        temperature: 0.6, // Temperatura menor para respostas mais precisas
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                
                // Sanitização imediata da resposta da IA
                state.correctAnswer = quiz.correta.trim();
                renderQuiz(quiz);

            } catch (e) {
                console.error("Falha na IA:", e);
                document.getElementById('question-text').innerText = "Erro ao carregar. Tentando novamente...";
                setTimeout(generateQuestion, 2000);
            }
        }

        function renderQuiz(quiz) {
            document.getElementById('question-text').innerText = quiz.pergunta;
            const stack = document.getElementById('options-stack');
            stack.innerHTML = "";

            quiz.opcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = "option-card w-full p-5 text-left border-2 border-slate-100 rounded-2xl font-medium text-slate-700 hover:border-indigo-200 hover:bg-indigo-50/50";
                btn.innerText = opcao;
                btn.onclick = () => validate(opcao, btn);
                stack.appendChild(btn);
            });
            state.isLocked = false;
        }

        function validate(selected, element) {
            if (state.isLocked) return;
            state.isLocked = true;

            const feedbackBar = document.getElementById('feedback-bar');
            const msg = document.getElementById('feedback-message');
            
            // Comparação Robusta (Removendo espaços extras e case-insensitive)
            const isCorrect = selected.trim().toLowerCase() === state.correctAnswer.toLowerCase();

            if (isCorrect) {
                element.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                feedbackBar.className = "p-6 flex items-center justify-between bg-green-500 text-white translate-y-0 transition-transform";
                msg.innerText = "Muito bem! 🎉";
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').onclick = nextStep;
            } else {
                element.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                feedbackBar.className = "p-6 flex items-center justify-between bg-red-500 text-white translate-y-0 transition-transform";
                msg.innerText = "Quase lá! Tente de novo.";
                
                // Libera para tentar de novo após 1s se errar
                setTimeout(() => {
                    feedbackBar.classList.add('translate-y-full');
                    state.isLocked = false;
                }, 1200);
            }
        }

        function nextStep() {
            if (state.step < 10) {
                state.step++;
                updateProgress();
                generateQuestion();
            } else {
                showFinal();
            }
        }

        function updateProgress() {
            document.getElementById('step-badge').innerText = `ETAPA ${state.step}/10`;
            document.getElementById('progress-bar').style.width = `${state.step * 10}%`;
            document.getElementById('feedback-bar').classList.add('translate-y-full');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function resetUI() {
            document.getElementById('question-text').innerText = "Pensando...";
            document.getElementById('options-stack').innerHTML = `
                <div class="loading-shimmer h-16 rounded-2xl"></div>
                <div class="loading-shimmer h-16 rounded-2xl"></div>
                <div class="loading-shimmer h-16 rounded-2xl"></div>
            `;
        }

        function showFinal() {
            document.getElementById('quiz-content').innerHTML = `
                <div class="text-center py-10">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-2xl font-bold mb-2">Nível Concluído!</h2>
                    <p class="text-slate-500 mb-8">Você dominou as estruturas básicas.</p>
                    <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">RECOMEÇAR</button>
                </div>
            `;
        }

        generateQuestion();
    </script>
</body>
</html>
