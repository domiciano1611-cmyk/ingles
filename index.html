<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow AI | Home Level</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #1e293b; }
        .option-card { transition: all 0.2s ease; }
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: move 1.5s infinite;
        }
        @keyframes move { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="pt-10 px-8">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-600 tracking-tight">Level 1: <span class="text-indigo-600">The House</span></h1>
                <span id="step-badge" class="text-xs font-bold text-slate-400">01 / 10</span>
            </div>
            <div class="h-1.5 w-full bg-slate-100 rounded-full">
                <div id="progress-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-500" style="width: 10%"></div>
            </div>
        </div>

        <div class="p-8">
            <div id="quiz-area">
                <p class="text-indigo-500 text-xs font-bold uppercase tracking-widest mb-2">Choose the correct answer</p>
                <h2 id="question-text" class="text-2xl font-semibold leading-snug mb-8 min-h-[64px]">...</h2>

                <div id="options-stack" class="space-y-3">
                    <div class="shimmer h-16 rounded-2xl"></div>
                    <div class="shimmer h-16 rounded-2xl"></div>
                    <div class="shimmer h-16 rounded-2xl"></div>
                </div>
            </div>
        </div>

        <div id="feedback-panel" class="p-6 translate-y-full transition-all duration-300 flex items-center justify-between">
            <p id="feedback-text" class="font-bold text-lg"></p>
            <button id="next-btn" class="hidden bg-white text-slate-900 px-8 py-2 rounded-xl font-bold shadow-lg active:scale-95 transition">Next</button>
        </div>
    </div>

    <script>
        // Substitua a parte do script no seu código por esta lógica atualizada:

const GROQ_KEY = "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";
let currentStep = 1;
let correctValue = "";
let busy = false;
let usedTerms = []; // MEMÓRIA para evitar repetições

async function loadQuestion() {
    busy = true;
    toggleSkeletons(true);
    
    // Instrução reforçada para evitar repetição
    const systemInstructions = `You are an English Teacher. 
    Create a unique multiple-choice question about "The House".
    
    CRITICAL RULES:
    1. Language: English only.
    2. Theme: Home (furniture, rooms, cleaning, house actions).
    3. NO REPETITION: Do not focus on these previously used topics: ${usedTerms.join(", ")}.
    4. Be specific: Instead of just "rooms", ask about objects like "vacuum cleaner", "pillows", "curtains", or "microwave".
    
    Format: {"question": "...", "options": ["...", "...", "..."], "answer": "...", "topic": "word_used"}`;

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: "system", content: systemInstructions },
                    { role: "user", content: `Generate a new creative question for step ${currentStep}.` }
                ],
                temperature: 0.9, // Aumentado para gerar respostas mais variadas
                top_p: 1,
                response_format: { type: "json_object" }
            })
        });

        const data = await response.json();
        const quiz = JSON.parse(data.choices[0].message.content);
        
        // Salva o tópico para não repetir na próxima
        if(quiz.topic) usedTerms.push(quiz.topic);
        
        render(quiz);
    } catch (err) {
        console.error("Fetch error:", err);
        setTimeout(loadQuestion, 2000);
    }
}

        function render(quiz) {
            document.getElementById('question-text').innerText = quiz.question;
            correctValue = quiz.answer.trim();
            
            const stack = document.getElementById('options-stack');
            stack.innerHTML = "";

            quiz.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-card w-full p-5 text-left border-2 border-slate-100 rounded-2xl font-medium text-slate-600 hover:border-indigo-200 hover:bg-indigo-50";
                btn.innerText = opt;
                btn.onclick = () => verify(opt, btn);
                stack.appendChild(btn);
            });
            busy = false;
        }

        function verify(selected, el) {
            if (busy) return;
            busy = true;

            const panel = document.getElementById('feedback-panel');
            const txt = document.getElementById('feedback-text');
            const next = document.getElementById('next-btn');

            if (selected.trim().toLowerCase() === correctValue.toLowerCase()) {
                el.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                panel.className = "p-6 flex items-center justify-between bg-green-500 text-white translate-y-0";
                txt.innerText = "Correct! ✨";
                next.classList.remove('hidden');
                next.onclick = moveForward;
            } else {
                el.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                panel.className = "p-6 flex items-center justify-between bg-red-500 text-white translate-y-0";
                txt.innerText = "Try again!";
                setTimeout(() => {
                    panel.classList.add('translate-y-full');
                    el.classList.remove('border-red-500', 'bg-red-50', 'text-red-700');
                    busy = false;
                }, 1000);
            }
        }

        function moveForward() {
            if (currentStep < 10) {
                currentStep++;
                document.getElementById('step-badge').innerText = `${currentStep.toString().padStart(2, '0')} / 10`;
                document.getElementById('progress-bar').style.width = `${currentStep * 10}%`;
                document.getElementById('feedback-panel').classList.add('translate-y-full');
                document.getElementById('next-btn').classList.add('hidden');
                loadQuestion();
            } else {
                showVictory();
            }
        }

        function toggleSkeletons(show) {
            if (!show) return;
            document.getElementById('question-text').innerText = "Generating...";
            document.getElementById('options-stack').innerHTML = `
                <div class="shimmer h-16 rounded-2xl"></div>
                <div class="shimmer h-16 rounded-2xl"></div>
                <div class="shimmer h-16 rounded-2xl"></div>
            `;
        }

        function showVictory() {
            document.getElementById('quiz-area').innerHTML = `
                <div class="text-center py-6">
                    <div class="text-5xl mb-4">🏠</div>
                    <h2 class="text-2xl font-bold">House Mastered!</h2>
                    <p class="text-slate-400 mt-2 mb-8">You finished all 10 steps.</p>
                    <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">Restart Level</button>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
