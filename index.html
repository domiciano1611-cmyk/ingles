<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow - Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --bg-dark: #050507;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            overflow: hidden; 
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* Sidebar & Content with Transparency for Three.js */
        nav, main { position: relative; z-index: 1; }
        nav { background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(5px); }

        .sidebar-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 3px solid transparent;
            margin: 4px 0;
        }
        .sidebar-item:hover { background: var(--glass); color: var(--accent-cyan); }
        .sidebar-active { 
            background: linear-gradient(90deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--accent-purple);
            color: var(--accent-purple) !important;
        }

        .unit-header { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .node {
            width: 80px; height: 80px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
            position: relative; transition: all 0.4s;
            background: rgba(10, 10, 12, 0.8);
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
            color: var(--accent-purple);
            margin: 30px auto;
        }

        .node:hover:not(.locked) {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
            background: var(--accent-purple);
            color: white;
        }

        .node.locked { border-color: #334155; color: #334155; opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .node.current { animation: pulse-cyan 2s infinite; border-color: var(--accent-cyan); color: var(--accent-cyan); }
        
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }

        .path-line {
            width: 2px; height: 60px;
            background: linear-gradient(to bottom, var(--accent-purple), #334155);
            margin: -20px auto;
        }

        #quiz-overlay {
            position: fixed; inset: 0; 
            background: rgba(5, 5, 7, 0.9); 
            backdrop-filter: blur(20px);
            z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
        }
        .btn-option:hover {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
        }

        .cyber-btn {
            background: var(--accent-purple);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: all 0.3s;
        }

        /* Ajuda de Tradução */
        #hint-box {
            display: none;
            background: rgba(6, 182, 212, 0.1);
            border: 1px dashed var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="flex">

    <div id="canvas-container"></div>

    <nav class="w-64 h-screen border-r border-white/10 p-6 flex flex-col fixed left-0">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg animate-pulse"></div>
            <h1 class="text-white text-2xl font-bold tracking-tighter">LINGOFLOW</h1>
        </div>
        
        <div class="space-y-1">
            <div class="sidebar-item sidebar-active p-4 flex items-center gap-4 cursor-pointer rounded-xl">
                <i class="fas fa-terminal text-lg"></i> <span class="font-medium text-sm tracking-wide">CONEXÃO</span>
            </div>
            <div class="sidebar-item p-4 flex items-center gap-4 cursor-pointer text-slate-500 rounded-xl">
                <i class="fas fa-database text-lg"></i> <span class="font-medium text-sm tracking-wide">MÓDULOS</span>
            </div>
            <div class="sidebar-item p-4 flex items-center gap-4 cursor-pointer text-slate-500 rounded-xl">
                <i class="fas fa-brain text-lg"></i> <span class="font-medium text-sm tracking-wide">NEURAL</span>
            </div>
        </div>
    </nav>

    <main class="ml-64 flex-1 p-12 flex justify-center overflow-y-auto h-screen">
        <div class="max-w-2xl w-full py-10">
            <div class="unit-header p-8 mb-16 flex justify-between items-end">
                <div>
                    <p id="section-tag" class="text-cyan-400 font-bold uppercase text-[10px] tracking-[0.3em] mb-2">SYSTEM READY / SEÇÃO 01</p>
                    <h2 id="section-title" class="text-3xl font-bold text-white">The House / <span class="text-slate-500 font-light italic">A Casa</span></h2>
                </div>
            </div>

            <div class="flex flex-col items-center pb-20">
                <div id="node-1" class="node current" onclick="startQuiz(1)"><i class="fas fa-microchip"></i></div>
                <div class="path-line"></div>
                <div id="node-2" class="node locked transform translate-x-12" onclick="startQuiz(2)"><i class="fas fa-lock"></i></div>
                <div class="path-line"></div>
                <div id="node-3" class="node locked transform -translate-x-8" onclick="startQuiz(3)"><i class="fas fa-lock"></i></div>
                <div class="path-line"></div>
                <div id="node-4" class="node locked" onclick="startQuiz(4)"><i class="fas fa-lock"></i></div>
                <div class="path-line"></div>
                <div id="node-5" class="node locked transform translate-x-10" onclick="startQuiz(5)"><i class="fas fa-shield-virus"></i></div>
            </div>
        </div>
    </main>

    <div id="quiz-overlay">
        <div class="w-full max-w-2xl p-8">
            <div class="flex items-center gap-6 mb-16">
                <button onclick="closeQuiz()" class="text-slate-500 hover:text-white transition-colors text-xl">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="flex-1 h-[2px] bg-slate-800">
                    <div id="quiz-progress" class="h-full bg-cyan-500 shadow-[0_0_10px_#06b6d4] transition-all duration-700" style="width: 10%"></div>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-4">
                <p class="text-cyan-400 text-xs font-bold tracking-[0.4em] uppercase">Neural Query:</p>
                <button onclick="toggleHint()" class="text-cyan-400 hover:text-white transition-all">
                    <i class="fas fa-lightbulb mr-2"></i><span class="text-xs font-bold uppercase tracking-widest">Tradução</span>
                </button>
            </div>

            <div id="hint-box"></div>
            <h2 id="q-text" class="text-4xl font-bold text-white mb-12 leading-tight">Initializing...</h2>
            
            <div id="options-box" class="grid gap-4"></div>
        </div>
        
        <div id="quiz-footer" class="w-full border-t border-white/10 p-10 flex justify-center translate-y-full transition-transform bg-black/80 backdrop-blur-xl fixed bottom-0">
            <div class="max-w-2xl w-full flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div id="status-light" class="w-3 h-3 rounded-full bg-slate-500"></div>
                    <span id="feedback-txt" class="text-lg font-bold tracking-wide uppercase">Aguardando Input</span>
                </div>
                <button id="btn-next" class="cyber-btn bg-purple-600 text-white px-12 py-4 font-bold text-sm tracking-widest">NEXT_MODULE</button>
            </div>
        </div>
    </div>

    <script>
        // --- THREE.JS BACKGROUND ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Estrelas
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
        const starVertices = [];
        for (let i = 0; i < 5000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = (Math.random() - 0.5) * 2000;
            starVertices.push(x, y, z);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Lua (Esfera)
        const moonGeometry = new THREE.SphereGeometry(5, 32, 32);
        const moonMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xeeeeee,
            emissive: 0x222222,
            roughness: 1
        });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        moon.position.set(20, 10, -50);
        scene.add(moon);

        // Luzes
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(5, 5, 5);
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(pointLight, ambientLight);

        camera.position.z = 30;

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0002;
            moon.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- APP LOGIC ---
        const API_KEY = "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";
        let currentLevel = 1;
        let stepInLevel = 1;
        let correctAns = "";
        let currentTranslation = "";
        let usedQuestions = [];
        let phase = 1;

        function toggleHint() {
            const hint = document.getElementById('hint-box');
            hint.innerText = currentTranslation;
            hint.style.display = hint.style.display === 'block' ? 'none' : 'block';
        }

        function startQuiz(levelId) {
            if(levelId > currentLevel) return;
            document.getElementById('quiz-overlay').style.display = 'flex';
            stepInLevel = 1;
            fetchQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-overlay').style.display = 'none';
            document.getElementById('hint-box').style.display = 'none';
        }

        async function fetchQuestion() {
            document.getElementById('hint-box').style.display = 'none';
            const phaseContext = phase === 1 ? "basic rooms (kitchen, bedroom, etc)" : "furniture and house objects";

            const prompt = `You are a high-tech English Teacher.
            Topic: ${phaseContext}. Difficulty: CEFR A1.
            Generate 1 unique question.
            JSON format: {"q": "Question in English", "tr": "Tradução fiel para Português do Brasil", "opts": ["Option 1", "Option 2", "Option 3"], "a": "Correct Option"}`;
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: prompt}],
                        response_format: {type: "json_object"},
                        temperature: 0.8
                    })
                });

                const data = await res.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                
                correctAns = quiz.a;
                currentTranslation = quiz.tr;
                
                document.getElementById('q-text').innerText = quiz.q;
                const box = document.getElementById('options-box');
                box.innerHTML = "";
                
                quiz.opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "btn-option w-full p-6 text-left rounded-2xl font-medium text-slate-300";
                    b.innerText = o;
                    b.onclick = () => verify(o, b);
                    box.appendChild(b);
                });
                document.getElementById('quiz-progress').style.width = (stepInLevel * 20) + "%";
            } catch(e) { fetchQuestion(); }
        }

        function verify(sel, b) {
            const footer = document.getElementById('quiz-footer');
            const fTxt = document.getElementById('feedback-txt');
            const light = document.getElementById('status-light');
            footer.classList.remove('translate-y-full');

            if(sel === correctAns) {
                b.classList.add('border-cyan-500', 'bg-cyan-500/10', 'text-cyan-400');
                fTxt.innerText = "ACCESS GRANTED";
                fTxt.className = "text-cyan-400 font-bold text-lg";
                light.className = "w-3 h-3 rounded-full bg-cyan-500";
                document.getElementById('btn-next').onclick = nextStep;
            } else {
                b.classList.add('border-red-500', 'bg-red-500/10', 'text-red-400');
                fTxt.innerText = "ERROR: SYSTEM EXPECTED " + correctAns.toUpperCase();
                fTxt.className = "text-red-400 font-bold text-lg";
                light.className = "w-3 h-3 rounded-full bg-red-500";
                document.getElementById('btn-next').onclick = fetchQuestion; 
            }
        }

        function nextStep() {
            document.getElementById('quiz-footer').classList.add('translate-y-full');
            if(stepInLevel < 5) {
                stepInLevel++;
                fetchQuestion();
            } else {
                unlockNextLevel();
            }
        }

        function unlockNextLevel() {
            currentLevel++;
            const nextNode = document.getElementById(`node-${currentLevel}`);
            if(nextNode) {
                nextNode.classList.remove('locked');
                nextNode.classList.add('current');
                nextNode.innerHTML = '<i class="fas fa-microchip"></i>';
            }
            closeQuiz();
        }
    </script>
</body>
</html>
