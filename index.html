<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoFlow AI | Aprenda Inglês</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .progress-bar { transition: width 0.4s ease-in-out; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-xl glass border border-slate-200 rounded-3xl shadow-xl overflow-hidden">
        
        <div class="p-6 border-b border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs font-bold uppercase tracking-wider text-indigo-600">Nível 1: Básico</span>
                <span id="step-counter" class="text-sm font-medium text-slate-500">Etapa 1/10</span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full">
                <div id="progress-fill" class="progress-bar bg-indigo-500 h-2 rounded-full" style="width: 10%"></div>
            </div>
        </div>

        <div id="quiz-container" class="p-8">
            <div id="loading" class="hidden animate-pulse">
                <div class="h-4 bg-slate-200 rounded w-3/4 mb-4"></div>
                <div class="h-12 bg-slate-100 rounded mb-2"></div>
                <div class="h-12 bg-slate-100 rounded mb-2"></div>
            </div>

            <div id="content">
                <h2 id="question-text" class="text-xl font-semibold text-slate-800 mb-6 text-center">
                    Carregando primeira lição...
                </h2>

                <div id="options-grid" class="grid gap-3">
                    </div>
            </div>
        </div>

        <div id="feedback" class="px-8 py-4 bg-slate-50 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        const GROQ_API_KEY = "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";
        let currentStep = 1;
        let currentCorrectAnswer = "";

        async function fetchQuestion() {
            toggleLoading(true);
            const prompt = `Gere uma pergunta de inglês nível iniciante (Etapa ${currentStep} de 10). 
            Responda APENAS em JSON no formato: 
            {"pergunta": "frase em pt", "traducao_alvo": "frase em en", "opcoes": ["A", "B", "C", "D"], "correta": "A"}`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }],
                        temperature: 0.7,
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const quiz = JSON.parse(data.choices[0].message.content);
                renderQuestion(quiz);
            } catch (error) {
                console.error("Erro ao buscar pergunta:", error);
            } finally {
                toggleLoading(false);
            }
        }

        function renderQuestion(quiz) {
            document.getElementById('question-text').innerText = `Como se diz: "${quiz.pergunta}"?`;
            currentCorrectAnswer = quiz.correta;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            
            quiz.opcoes.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 text-left border-2 border-slate-200 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all font-medium text-slate-700";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if (selected === currentCorrectAnswer) {
                btn.classList.replace('border-slate-200', 'border-green-500');
                btn.classList.add('bg-green-50');
                feedback.innerText = "✨ Excelente! Você acertou.";
                feedback.className = "px-8 py-4 bg-green-50 text-green-700 text-center text-sm font-bold";
                
                setTimeout(nextStep, 1500);
            } else {
                btn.classList.replace('border-slate-200', 'border-red-500');
                btn.classList.add('bg-red-50');
                feedback.innerText = "Ops! Tente novamente.";
                feedback.className = "px-8 py-4 bg-red-50 text-red-700 text-center text-sm font-bold";
            }
        }

        function nextStep() {
            if (currentStep < 10) {
                currentStep++;
                updateUI();
                fetchQuestion();
            } else {
                finishLevel();
            }
        }

        function updateUI() {
            document.getElementById('step-counter').innerText = `Etapa ${currentStep}/10`;
            document.getElementById('progress-fill').style.width = `${currentStep * 10}%`;
            document.getElementById('feedback').classList.add('hidden');
        }

        function toggleLoading(show) {
            document.getElementById('loading').classList.toggle('hidden', !show);
            document.getElementById('content').classList.toggle('hidden', show);
        }

        function finishLevel() {
            document.getElementById('quiz-container').innerHTML = `
                <div class="text-center">
                    <h2 class="text-3xl font-bold text-indigo-600 mb-4">Level Complete! 🏆</h2>
                    <p class="text-slate-600 mb-6">Você concluiu as 10 etapas com sucesso.</p>
                    <button onclick="location.reload()" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-indigo-700 transition">Próximo Nível</button>
                </div>
            `;
        }

        // Iniciar
        fetchQuestion();
    </script>
</body>
</html>
